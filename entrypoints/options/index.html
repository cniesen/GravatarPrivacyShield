<!doctype html>
<html>
<head>
  <title>Gravatar Privacy Shield Settings</title>
  <link rel="stylesheet" href="@/options/style.css">
</head>
<body>
  <h2>Gravatar Privacy Shield</h2>

  <form id="optionsForm">
    <h3>Mode</h3>
    <label><input type="radio" name="mode" value="randomize"> Randomize requests</label><br>
    <label><input type="radio" name="mode" value="block"> Block requests and return placeholder</label>

    <h3>Scope</h3>
    <label><input type="radio" name="scope" value="all"> Apply to ALL Gravatar requests</label><br>
    <label><input type="radio" name="scope" value="emails"> Apply ONLY to selected email addresses</label>

    <h3>Email List</h3>
    <textarea id="emailList" rows="6" cols="40" placeholder="one email per line"></textarea>

    <h3>Global Placeholder Image</h3>
    <input type="file" id="defaultPlaceholder" accept="image/*">

    <h3>Per-Email Custom Images</h3>
    <div id="emailUploads"></div>

    <button id="save">Save Settings</button>
  </form>
  <span id="status"></span>

  <script type="module" src="./main.js"></script>
</body>
</html>
